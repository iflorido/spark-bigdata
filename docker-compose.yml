services:
  dashboard:
    build: .
    container_name: fraud-dashboard
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      - PYTHONUNBUFFERED=1
      - PROJECT_ROOT=/app
    volumes:
      - ./data/aggregated:/app/data/aggregated:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 30s
      timeout: 10s
      retries: 3
